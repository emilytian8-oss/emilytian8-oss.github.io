        h2 { border-left: 5px solid #0b67ff; padding-left: 15px; margin-bottom: 25px; font-size: 24px; text-transform: uppercase; }
        
        /* Intro Section */
        .intro-flex { display: flex; flex-wrap: wrap; gap: 30px; align-items: flex-start; }

        .service-item h4 { margin-top: 0; color: #0b67ff; font-size: 17px; margin-bottom: 10px; }

        /* Workflow */

        .step-list { list-style: none; padding: 0; margin: 0; }

        .qa-card p { font-size: 12px; color: #666; margin: 0; }
        
        .adv-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .adv-item { display: flex; align-items: center; background: #eef6ff; padding: 15px; border-radius: 8px; }
        .adv-icon { background: #0b67ff; color: #fff; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 15px; flex-shrink: 0; font-weight: bold; }
        .adv-text h4 { margin: 0; font-size: 15px; color: #0b3f8c; }
        .adv-text p { margin: 0; font-size: 12px; color: #666; }

        .footer-address { max-width: 800px; margin: 10px auto; color: #444; }
